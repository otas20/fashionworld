<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FashionWorld Shop</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0f;
  color: white;
}

header {
  padding: 25px;
  text-align: center;
  font-size: 32px;
  font-weight: bold;
  background: linear-gradient(90deg, #ff4d6d, #6c63ff);
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 18px;
}

.card {
  background: #151522;
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-6px);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

.price {
  color: #6c63ff;
  font-weight: bold;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #151522;
  padding: 20px;
  border-radius: 15px;
  max-width: 520px;
  width: 90%;
  position: relative;
}

.modal img {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 10px;
}

.close {
  position: absolute;
  right: 15px;
  top: 10px;
  cursor: pointer;
  font-size: 20px;
}

.buy {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  background: #ff4d6d;
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
👕 FashionWorld Shop
</header>

<div class="container">

<div class="grid">

  <div class="card" onclick="openModal(0)">
    <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=800&q=60">
    <div class="card-content">
      <h3>Clean Street Fit</h3>
      <div class="price">≈ 2900 Kč</div>
    </div>
  </div>

  <div class="card" onclick="openModal(1)">
    <img src="https://images.unsplash.com/photo-1520975682031-2b7f4d5d2a3c?auto=format&fit=crop&w=800&q=60">
    <div class="card-content">
      <h3>Budget Fit</h3>
      <div class="price">≈ 2100 Kč</div>
    </div>
  </div>

  <div class="card" onclick="openModal(2)">
    <img src="https://images.unsplash.com/photo-1520975867597-0a0b6f4f0a7a?auto=format&fit=crop&w=800&q=60">
    <div class="card-content">
      <h3>Winter Street Fit</h3>
      <div class="price">≈ 4200 Kč</div>
    </div>
  </div>

  <div class="card" onclick="openModal(3)">
    <img src="https://images.unsplash.com/photo-1520975693410-7c5d5a2f1c1a?auto=format&fit=crop&w=800&q=60">
    <div class="card-content">
      <h3>Casual Everyday Fit</h3>
      <div class="price">≈ 1800 Kč</div>
    </div>
  </div>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>

    <img id="modalImg">

    <h2 id="modalTitle"></h2>
    <p id="modalItems"></p>
    <h3 id="modalPrice"></h3>

    <button class="buy">Zobrazit podobné outfity</button>
  </div>
</div>

<script>

const outfits = [
  {
    title: "Clean Street Fit",
    items: "Oversized hoodie • Blue jeans • White sneakers",
    price: "≈ 2900 Kč",
    img: "https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=800&q=60"
  },
  {
    title: "Budget Fit",
    items: "Basic hoodie • Tee • Jeans • Sneakers",
    price: "≈ 2100 Kč",
    img: "https://images.unsplash.com/photo-1520975682031-2b7f4d5d2a3c?auto=format&fit=crop&w=800&q=60"
  },
  {
    title: "Winter Street Fit",
    items: "Puffer jacket • Hoodie • Jeans • Boots",
    price: "≈ 4200 Kč",
    img: "https://images.unsplash.com/photo-1520975867597-0a0b6f4f0a7a?auto=format&fit=crop&w=800&q=60"
  },
  {
    title: "Casual Everyday Fit",
    items: "Hoodie • Joggers • Sneakers",
    price: "≈ 1800 Kč",
    img: "https://images.unsplash.com/photo-1520975693410-7c5d5a2f1c1a?auto=format&fit=crop&w=800&q=60"
  }
];

function openModal(i) {
  const o = outfits[i];

  document.getElementById("modalImg").src = o.img;
  document.getElementById("modalTitle").innerText = o.title;
  document.getElementById("modalItems").innerText = o.items;
  document.getElementById("modalPrice").innerText = o.price;

  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
