<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outfit Detail</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0f;
  color: white;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.left {
  flex: 1;
}

.left img {
  width: 100%;
  border-radius: 15px;
}

.gallery {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.gallery img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
  opacity: 0.7;
}

.gallery img:hover {
  opacity: 1;
}

.right {
  flex: 1;
  min-width: 280px;
}

.price {
  font-size: 28px;
  color: #6c63ff;
  margin: 10px 0;
}

button {
  background: #ff4d6d;
  border: none;
  padding: 12px;
  color: white;
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <img id="mainImg" src="https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=800&q=60">

    <div class="gallery">
      <img onclick="change(this)" src="https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=800&q=60">
      <img onclick="change(this)" src="https://images.unsplash.com/photo-1520975682031-2b7f4d5d2a3c?auto=format&fit=crop&w=800&q=60">
      <img onclick="change(this)" src="https://images.unsplash.com/photo-1520975867597-0a0b6f4f0a7a?auto=format&fit=crop&w=800&q=60">
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <h1>Clean Street Outfit</h1>

    <div class="price">≈ 2900 Kč</div>

    <p>
      Oversized hoodie + jeans + sneakers.  
      Styl: streetwear / school outfit / clean aesthetic.
    </p>

    <button>🛒 Zobrazit podobné outfity</button>
  </div>

</div>

<script>
function change(img){
  document.getElementById("mainImg").src = img.src;
}
</script>

</body>
</html>
